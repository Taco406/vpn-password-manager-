<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SENTINEL</title>
    <style>
      :root {
        --bg: #0a0e14; --raised: #0f141c; --border: #28323f; --text: #e6edf3;
        --muted: #9aa7b4; --accent: #22d3ee; --ok: #2ed47a;
      }
      * { box-sizing: border-box; }
      body { width: 340px; margin: 0; background: var(--bg); color: var(--text);
        font: 14px "Inter", system-ui, sans-serif; }
      header { display: flex; align-items: center; justify-content: space-between;
        padding: 12px 14px; border-bottom: 1px solid var(--border); }
      .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
      .dot.on { background: var(--ok); }
      .pill { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
      .search { margin: 12px 14px; display: flex; align-items: center; gap: 8px;
        background: #080b10; border: 1px solid var(--border); border-radius: 10px; padding: 0 10px; }
      .search input { flex: 1; background: none; border: 0; color: var(--text); padding: 9px 0; outline: none; }
      ul { list-style: none; margin: 0; padding: 0 8px 10px; max-height: 340px; overflow-y: auto; }
      li { display: flex; align-items: center; gap: 10px; padding: 9px 8px; border-radius: 8px; cursor: pointer; }
      li:hover { background: #22d3ee14; }
      .fav { width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center;
        font-weight: 600; font-size: 13px; }
      .title { font-weight: 500; }
      .user { font-size: 12px; color: var(--muted); }
      .actions { margin-left: auto; display: flex; gap: 6px; opacity: 0; }
      li:hover .actions { opacity: 1; }
      .actions button { background: none; border: 1px solid var(--border); color: var(--muted);
        border-radius: 6px; padding: 3px 7px; font-size: 11px; cursor: pointer; }
      .actions button:hover { color: var(--accent); border-color: var(--accent); }
      .locked { padding: 40px 20px; text-align: center; color: var(--muted); }
      .locked b { color: var(--text); display: block; margin-bottom: 6px; }
      .mono { font-family: "JetBrains Mono", monospace; }
    </style>
  </head>
  <body>
    <header>
      <span class="brand">🛡 SENTINEL</span>
      <span class="pill"><span id="vpnDot" class="dot"></span><span id="vpnLabel">VPN off</span></span>
    </header>
    <div id="app"></div>
    <script type="module" src="./src/popup/popup.ts"></script>
  </body>
</html>
