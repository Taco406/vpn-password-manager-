name: Release

# Build installers for Windows, macOS, and Linux and publish a GitHub Release with a
# signed `latest.json` update manifest, so installed apps can self-update.
#
# Trigger: push a version tag (e.g. `v0.2.0`) — `just release 0.2.0` does this for you.
# Also runnable manually via the Actions tab (workflow_dispatch).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           the updater private key (from `tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password
# And paste the matching PUBLIC key into apps/desktop/src-tauri/tauri.conf.json
# (plugins.updater.pubkey). See docs/releasing.md.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential curl wget file libssl-dev libgtk-3-dev libxdo-dev \
            libayatana-appindicator3-dev

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - run: pnpm install --frozen-lockfile

      - name: Build + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          releaseName: "SENTINEL ${{ github.ref_type == 'tag' && github.ref_name || format('build {0}', github.run_number) }}"
          releaseBody: "Download the installer for your platform below. Installed apps update themselves from this release."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
