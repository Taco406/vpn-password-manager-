name: Release

# Build installers for Windows, macOS, and Linux and publish a GitHub Release with a
# signed `latest.json` update manifest, so installed apps can self-update.
#
# Trigger: push a version tag (e.g. `v0.2.0`) — `just release 0.2.0` does this for you.
# Also runnable manually via the Actions tab (workflow_dispatch).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           the updater private key (from `tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password
# And paste the matching PUBLIC key into apps/desktop/src-tauri/tauri.conf.json
# (plugins.updater.pubkey). See docs/releasing.md.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Leave blank to use the app version from tauri.conf.json."
        required: false
        default: ""
      unsigned_mac:
        description: "Skip Mac code signing for this run (escape hatch: ships a right-click-to-open Mac app instead of blocking the release)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  # Releases must never ship untested code: deployed servers auto-pull the :latest image daily,
  # so a red build reaching ghcr would propagate to the whole fleet within a day. Everything
  # below `needs:` this gate.
  gate:
    name: Test gate (server + core + guards)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://sentinel:sentinel@127.0.0.1:5433/sentinel
      SQLX_OFFLINE: "true"
      SENTINEL_ARGON2_PROFILE: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - name: interop + version guards
        run: |
          bash scripts/interop-check.sh
          bash scripts/version-check.sh
          bash scripts/migrations-check.sh
      - name: apply migrations
        run: |
          for f in services/api/migrations/[0-9]*.sql; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: test server + core
        run: cargo test -p sentinel-api -p sentinel-core
      # Make re-dispatching a failed release safe: a draft left by a previous run is deleted so
      # the builds start clean (drafts have no git tag, so nothing else references them). A
      # PUBLISHED release with this tag means installed apps may have already updated from it —
      # refuse to rebuild it; bump the version instead.
      - name: Reset stale draft (idempotent re-runs)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="v$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)"
          fi
          state=$(gh release view "$tag" --json isDraft -q .isDraft 2>/dev/null || echo "absent")
          if [ "$state" = "true" ]; then
            echo "Deleting stale draft $tag left by a previous failed run"
            gh release delete "$tag" --yes
          elif [ "$state" = "false" ]; then
            echo "::error::$tag is already published — bump the version instead of re-releasing it"
            exit 1
          else
            echo "No existing release for $tag — clean start"
          fi

  # Publish the sync-server image so a one-click "Deploy my sync server" can `docker run` it on a
  # fresh Linode (no on-box Rust build). Runs alongside the desktop release build.
  # NOTE: after the first publish, set the ghcr package visibility to Public so the Linode can pull
  # it unauthenticated (see docs/self-hosting.md).
  publish-api-image:
    name: Publish sync-server image (ghcr)
    needs: gate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .                         # repo root — the Dockerfile's `COPY . .` needs the whole workspace
          file: services/api/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.name }}/sentinel-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: gate
    strategy:
      fail-fast: false
      # SERIAL, not parallel: each platform job merges its entry into the shared latest.json
      # asset on the draft (read → add my platform → overwrite). Run in parallel, two jobs can
      # read the same base and the last writer erases the other's entry — this dropped darwin-*
      # from v0.1.49's manifest (the finalize gate caught it). Slower wall-clock is fine;
      # a manifest missing a platform bricks that platform's auto-update.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            build-essential curl wget file libssl-dev libgtk-3-dev libxdo-dev \
            libayatana-appindicator3-dev

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - run: pnpm install --frozen-lockfile

      # Resolve the release tag once, so a tag push, a manual run with an explicit
      # tag, and a plain manual run (derive `v<version>` from the app config) all
      # produce a clean semver release name. node is on PATH after setup-node.
      - name: Compute release tag
        id: rel
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            v=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")
            tag="v$v"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      # Use the matching CHANGELOG.md section as the GitHub Release notes, so releases and the
      # in-app "What's new" stay in lockstep. Falls back to a generic line if no section exists.
      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          ver="${{ steps.rel.outputs.tag }}"; ver="${ver#v}"
          notes=$(awk -v v="$ver" '
            index($0, "## [" v "]") == 1 { grab = 1; next }
            grab && index($0, "## [") == 1 { exit }
            grab { print }
          ' CHANGELOG.md)
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            notes="See the assets below."
          fi
          {
            echo "body<<SENTINEL_EOF"
            printf '%s\n' "$notes"
            echo ""
            echo "Download the installer for your platform below. Installed apps update themselves from this release."
            echo "SENTINEL_EOF"
          } >> "$GITHUB_OUTPUT"

      # macOS Developer ID signing + notarization — only turned on when the certificate secret is
      # actually present. Tauri's macOS bundler keys off whether APPLE_CERTIFICATE is *set*, not
      # whether it's non-empty, so exporting it as an empty string (before the certs are added)
      # makes it try to import an empty certificate and fails the whole macOS build. Gate it so
      # unsigned builds keep working until the secrets exist. See docs/macos-signing.md.
      - name: Configure Apple code signing (only when a certificate secret is present)
        if: matrix.platform == 'macos-latest' && github.event.inputs.unsigned_mac != 'true'
        shell: bash
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PW: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          A_ID: ${{ secrets.APPLE_ID }}
          A_PW: ${{ secrets.APPLE_PASSWORD }}
          TEAM: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          if [ -n "$CERT" ]; then
            # Derive the signing identity from the certificate itself instead of trusting the
            # hand-typed APPLE_SIGNING_IDENTITY secret — codesign matches on the cert's CN, and
            # a copy-paste mismatch ("failed to resolve signing identity") is the most common
            # way this build breaks. Probe with the same `security` tooling the real signing
            # uses (openssl can't read Keychain's .p12 encryption reliably): import into a
            # scratch keychain, list the identities as codesign would see them, and take the
            # first VALID one. Strictly best-effort under set +e — this can only ever improve
            # the identity, never block the build. Prints identity names only, never secrets.
            set +e
            p12="$RUNNER_TEMP/signing-cert.p12"
            printf '%s' "$CERT" | tr -d '\n\r ' | base64 -d > "$p12" 2>/dev/null
            kc="$RUNNER_TEMP/idprobe.keychain-db"
            security create-keychain -p probepass "$kc" 2>/dev/null
            security import "$p12" -k "$kc" -P "$CERT_PW" -T /usr/bin/codesign >/dev/null 2>&1
            echo "Identities inside the APPLE_CERTIFICATE .p12 (as codesign sees them):"
            security find-identity -p codesigning "$kc" 2>/dev/null
            # Only "Developer ID Application" identities can distribute outside the App Store —
            # notarization rejects a build signed with anything else (e.g. Apple Development).
            valid=$(security find-identity -v -p codesigning "$kc" 2>/dev/null \
              | sed -n 's/^[[:space:]]*[0-9][0-9]*) [0-9A-F]\{40\} "\(Developer ID Application:[^"]*\)"$/\1/p' | head -1)
            security delete-keychain "$kc" 2>/dev/null
            rm -f "$p12"
            set -e
            if [ -n "$valid" ]; then
              echo "Using signing identity from the certificate: $valid"
              IDENTITY="$valid"
            else
              echo "No valid 'Developer ID Application' identity in the .p12 — falling back to the APPLE_SIGNING_IDENTITY secret; the listing above shows what the file actually contains (run the 'Check Apple signing secrets' workflow for a verdict without a release cycle)."
            fi
            {
              echo "APPLE_CERTIFICATE=$CERT"
              echo "APPLE_CERTIFICATE_PASSWORD=$CERT_PW"
              echo "APPLE_SIGNING_IDENTITY=$IDENTITY"
              echo "APPLE_TEAM_ID=$TEAM"
            } >> "$GITHUB_ENV"
            # Notarization credential: prefer the App Store Connect API key (the same three
            # APPSTORE_* secrets the TestFlight workflow uses — no extra setup), falling back
            # to an Apple-ID + app-specific password if that's what's configured instead.
            if [ -n "$ASC_KEY_P8" ]; then
              mkdir -p "$RUNNER_TEMP/apple_keys"
              printf '%s' "$ASC_KEY_P8" > "$RUNNER_TEMP/apple_keys/AuthKey_$ASC_KEY_ID.p8"
              {
                echo "APPLE_API_KEY=$ASC_KEY_ID"
                echo "APPLE_API_ISSUER=$ASC_ISSUER"
                echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/apple_keys/AuthKey_$ASC_KEY_ID.p8"
              } >> "$GITHUB_ENV"
              echo "Apple signing configured — notarizing with the App Store Connect API key."
            else
              {
                echo "APPLE_ID=$A_ID"
                echo "APPLE_PASSWORD=$A_PW"
              } >> "$GITHUB_ENV"
              echo "Apple signing configured — notarizing with Apple ID + app-specific password."
            fi
          else
            echo "No APPLE_CERTIFICATE secret set — building the macOS app UNSIGNED."
          fi

      - name: Build + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ steps.rel.outputs.tag }}
          releaseName: "NorthKey ${{ steps.rel.outputs.tag }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          # Draft until ALL three platforms have uploaded and latest.json is verified complete
          # (the finalize job below flips it live). Publishing incrementally used to mean a
          # failed Windows build could leave a public "latest" with no Windows entry — installed
          # apps on that platform would silently stop updating.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Verify the draft is complete, then publish it atomically. If anything here fails, the draft
  # stays invisible and installed apps keep updating from the previous good release.
  finalize:
    name: Verify + publish release
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: write # to chain the iOS TestFlight build after publishing
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute release tag
        id: rel
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            v=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")
            tag="v$v"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: latest.json covers every platform
        run: |
          gh release download "${{ steps.rel.outputs.tag }}" -p latest.json -O latest.json
          python3 - <<'PY'
          import json, sys
          m = json.load(open("latest.json"))
          plats = set(m.get("platforms", {}))
          need = {"windows-x86_64", "linux-x86_64"}
          missing = need - plats
          if missing or not any(p.startswith("darwin-") for p in plats):
              sys.exit(f"latest.json incomplete: has {sorted(plats)}, missing {sorted(missing) or 'darwin-*'}")
          for p, entry in m["platforms"].items():
              if not entry.get("signature") or not entry.get("url"):
                  sys.exit(f"platform {p} missing signature/url")
          print("latest.json OK:", sorted(plats), "version", m.get("version"))
          PY
      - name: publish
        run: gh release edit "${{ steps.rel.outputs.tag }}" --draft=false --latest
      # GitHub never triggers workflows from events created with a workflow's own token
      # (recursion guard), so publishing above does NOT fire ios-testflight.yml's
      # `release: published` trigger — chain the phone build explicitly instead.
      - name: kick off the iOS TestFlight build
        run: gh workflow run ios-testflight.yml --ref main
