name: Release

# Build installers for Windows, macOS, and Linux and publish a GitHub Release with a
# signed `latest.json` update manifest, so installed apps can self-update.
#
# Trigger: push a version tag (e.g. `v0.2.0`) — `just release 0.2.0` does this for you.
# Also runnable manually via the Actions tab (workflow_dispatch).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           the updater private key (from `tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password
# And paste the matching PUBLIC key into apps/desktop/src-tauri/tauri.conf.json
# (plugins.updater.pubkey). See docs/releasing.md.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Leave blank to use the app version from tauri.conf.json."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # Publish the sync-server image so a one-click "Deploy my sync server" can `docker run` it on a
  # fresh Linode (no on-box Rust build). Runs alongside the desktop release build.
  # NOTE: after the first publish, set the ghcr package visibility to Public so the Linode can pull
  # it unauthenticated (see docs/self-hosting.md).
  publish-api-image:
    name: Publish sync-server image (ghcr)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .                         # repo root — the Dockerfile's `COPY . .` needs the whole workspace
          file: services/api/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.name }}/sentinel-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            build-essential curl wget file libssl-dev libgtk-3-dev libxdo-dev \
            libayatana-appindicator3-dev

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./ -> target"

      - run: pnpm install --frozen-lockfile

      # Resolve the release tag once, so a tag push, a manual run with an explicit
      # tag, and a plain manual run (derive `v<version>` from the app config) all
      # produce a clean semver release name. node is on PATH after setup-node.
      - name: Compute release tag
        id: rel
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            v=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")
            tag="v$v"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      # Use the matching CHANGELOG.md section as the GitHub Release notes, so releases and the
      # in-app "What's new" stay in lockstep. Falls back to a generic line if no section exists.
      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          ver="${{ steps.rel.outputs.tag }}"; ver="${ver#v}"
          notes=$(awk -v v="$ver" '
            index($0, "## [" v "]") == 1 { grab = 1; next }
            grab && index($0, "## [") == 1 { exit }
            grab { print }
          ' CHANGELOG.md)
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            notes="See the assets below."
          fi
          {
            echo "body<<SENTINEL_EOF"
            printf '%s\n' "$notes"
            echo ""
            echo "Download the installer for your platform below. Installed apps update themselves from this release."
            echo "SENTINEL_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID code signing + notarization. All optional: when these secrets are
          # empty (e.g. before the Apple certs are added), tauri-action builds an UNSIGNED macOS
          # app exactly as before — so this is safe to land ahead of the certs. See
          # docs/macos-signing.md for how to create each one.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ steps.rel.outputs.tag }}
          releaseName: "NorthKey ${{ steps.rel.outputs.tag }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
