name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SENTINEL_ARGON2_PROFILE: test

jobs:
  rust:
    name: Rust — fmt, clippy, test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      # Default members exclude sentinel-desktop (Tauri), which needs webkit2gtk not
      # present on the runner. The desktop crate is glue over the tested core.
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test (core + cli + nm-host)
        run: cargo test -p sentinel-core -p sentinel-cli -p sentinel-nm-host
      - name: production Argon2 profile smoke test
        run: cargo test -p sentinel-core --release argon2_production_profile -- --ignored --test-threads=1

  api:
    name: API — Postgres integration
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://sentinel:sentinel@127.0.0.1:5433/sentinel
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
      - name: apply migrations
        run: |
          for f in services/api/migrations/[0-9]*.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: test
        run: cargo test -p sentinel-api

  web:
    name: Web — typecheck, lint, build, e2e
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test
      - run: pnpm --filter @sentinel/desktop build
      - name: install Playwright browsers
        run: pnpm --filter @sentinel/desktop exec playwright install --with-deps chromium
      - name: e2e + screenshots
        run: pnpm --filter @sentinel/desktop e2e

  desktop-macos:
    name: Desktop — macOS build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      # `tauri::generate_context!` embeds the frontend at compile time, and tauri-build validates
      # the bundled `resources/extension` path — so both the frontend dist and the staged
      # extension must exist before the desktop crate compiles (mirrors the app's
      # beforeBuildCommand). macOS uses the system WebKit (no webkit2gtk needed), so unlike the
      # Linux `rust` job this can build sentinel-desktop — which is how the macOS-specific code
      # (Touch ID, VPN platform gating) gets verified before merge.
      - run: pnpm --filter @sentinel/desktop build
      - run: pnpm --filter @sentinel/extension build
      - run: node apps/desktop/scripts/stage-extension.mjs
      - name: clippy (desktop, macOS)
        run: cargo clippy -p sentinel-desktop --all-targets -- -D warnings
      - name: test (desktop, macOS)
        run: cargo test -p sentinel-desktop

  audit:
    name: Security audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked || true
          cargo audit || true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Blocking: fail the build on any HIGH/CRITICAL advisory in production dependencies.
      # (Moderate/low stay advisory to avoid churn from unfixable transitive notices.)
      - name: pnpm audit (prod, high+)
        run: pnpm audit --prod --audit-level high
      - name: pnpm audit (all, advisory)
        run: pnpm audit || true
      - name: plaintext-secret audit
        run: bash scripts/plaintext-audit.sh
